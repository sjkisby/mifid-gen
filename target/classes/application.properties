# ── Application ───────────────────────────────────────────────────────────────
quarkus.application.name=mifid-pdf-poc
quarkus.application.version=1.0.0

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ── Qute template engine ──────────────────────────────────────────────────────
quarkus.qute.strict-rendering=true

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.example.mifid".level=DEBUG

%dev.quarkus.log.category."com.example.mifid".level=DEBUG